name: Compile Book to PDF

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy matplotlib jupyter pyyaml

      - name: Set up Quarto and TinyTeX
        uses: quarto-dev/quarto-actions/setup@v2
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          tinytex: true

      - name: Prepare PDF configuration
        run: |
          python <<'PY'
          from pathlib import Path
          import yaml

          config_path = Path("_quarto.yml")
          config = yaml.safe_load(config_path.read_text(encoding="utf-8"))

          # Replace the HTML output configuration with PDF output.
          config["format"] = {
              "pdf": {
                  "pdf-engine": "lualatex",
                  "toc": True,
                  "toc-depth": 2,
                  "keep-tex": True,
                  "latex-auto-install": True,
                  "code-overflow": "wrap",
                  "fig-cap-location": "bottom",
                  "tbl-cap-location": "top",
                  "linkcolor": "black",
                  "urlcolor": "blue",
              }
          }

          # Keep the PDF-compatible filter and remove imagify.
          config["filters"] = ["pseudocode"]

          config_path.write_text(
              yaml.safe_dump(
                  config,
                  sort_keys=False,
                  allow_unicode=True
              ),
              encoding="utf-8",
          )

          # Remove the HTML-only title include from index.qmd.
          index_path = Path("index.qmd")
          text = index_path.read_text(encoding="utf-8")
          text = text.replace(
              "include-before-body: pre-title.html\n",
              ""
          )
          text = text.replace(
              "title-block-style: none\n",
              ""
          )
          index_path.write_text(text, encoding="utf-8")
          PY

      - name: Render book to PDF
        env:
          QUARTO_PRINT_STACK: "true"
        run: |
          quarto render --to pdf

      - name: Upload PDF
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: visionbook-pdf
          path: _book/*.pdf
          if-no-files-found: error

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visionbook-pdf-debug
          path: |
            _book/**/*.tex
            _book/**/*.log
            **/*.log
          if-no-files-found: ignore
