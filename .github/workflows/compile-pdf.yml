name: Build Visionbook for Offline Reading

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-html:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy matplotlib jupyter

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Render book as HTML
        run: |
          quarto render --to html

      - name: Add offline instructions
        run: |
          cat > _book/README_LOCAL.txt <<'EOF'
          Visionbook Offline Copy

          1. Extract the downloaded artifact.
          2. Open a terminal inside the extracted _book folder.
          3. Run:

             python -m http.server 8000

          4. Open this address in your browser:

             http://localhost:8000

          Stop the server with Ctrl+C.
          EOF

      - name: Upload offline HTML book
        uses: actions/upload-artifact@v4
        with:
          name: visionbook-offline-html
          path: _book/
          if-no-files-found: error
          retention-days: 30
